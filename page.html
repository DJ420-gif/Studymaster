<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Justify Yourself</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 52px;
  cursor: crosshair;
  background: #000;
  overflow: hidden;
}

/* Angry gradient background */
.bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 120% 80% at 50% 50%,
    #3a0000 0%,
    #1a0000 35%,
    #000 70%
  );
  z-index: 0;
  animation: bgBreath 4s ease-in-out infinite;
}

/* Extra heat layer */
.bg2 {
  position: fixed;
  inset: 0;
  background: conic-gradient(
    from 200deg at 30% 60%,
    rgba(255,40,0,0.12),
    rgba(180,0,0,0.18),
    rgba(255,100,0,0.08),
    rgba(100,0,0,0.2),
    rgba(255,40,0,0.12)
  );
  z-index: 0;
  animation: rotate 12s linear infinite;
}

.bg3 {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 60% 60% at 70% 30%, rgba(255,60,0,0.1), transparent),
              radial-gradient(ellipse 50% 50% at 20% 80%, rgba(200,0,0,0.12), transparent);
  z-index: 0;
}

@keyframes bgBreath {
  0%,100% { opacity: 1; }
  50% { opacity: 0.75; }
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Content */
.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 52px;
}

/* Message */
.msg {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.8rem, 10vw, 9rem);
  line-height: 0.9;
  letter-spacing: 0.04em;
  text-align: center;
  background: linear-gradient(
    160deg,
    #fff5f0 0%,
    #ff9966 25%,
    #ff2200 50%,
    #cc0000 70%,
    #660000 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 30px rgba(255,40,0,0.5)) drop-shadow(2px 2px 0 rgba(180,0,0,0.8));
  animation: msgAppear 0.6s cubic-bezier(.22,1,.36,1) both, ragePulse 5s 1s ease-in-out infinite;
}

@keyframes msgAppear {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes ragePulse {
  0%,100% { filter: drop-shadow(0 0 30px rgba(255,40,0,.5)) drop-shadow(2px 2px 0 rgba(180,0,0,.8)); }
  50%      { filter: drop-shadow(0 0 60px rgba(255,80,0,.9)) drop-shadow(2px 2px 0 rgba(255,0,0,1)); }
}

/* Button */
.btn {
  position: relative;
  display: inline-block;
  text-decoration: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.7rem;
  letter-spacing: 0.25em;
  color: #fff5f0;
  padding: 22px 64px;
  background: linear-gradient(135deg, #cc0000 0%, #ff2200 40%, #ff6600 100%);
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  overflow: hidden;
  transition: transform 0.15s, filter 0.2s;
  animation: btnAppear 0.6s 0.15s cubic-bezier(.22,1,.36,1) both, btnGlow 2.5s ease-in-out infinite;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
  transform: translateX(-150%);
  transition: transform 0.5s ease;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 1px;
  clip-path: polygon(11px 0%, 100% 0%, calc(100% - 11px) 100%, 0% 100%);
  background: linear-gradient(135deg, #ff1a00 0%, #ff4400 50%, #ff8800 100%);
  opacity: 0;
  transition: opacity 0.2s;
}

.btn span {
  position: relative;
  z-index: 1;
}

.btn:hover::before { transform: translateX(150%); }
.btn:hover::after  { opacity: 1; }
.btn:hover {
  transform: scale(1.05);
  filter: drop-shadow(0 0 24px rgba(255,60,0,0.9)) drop-shadow(0 0 60px rgba(200,0,0,0.5));
  animation: none;
}
.btn:active { transform: scale(0.97); }

@keyframes btnAppear {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes btnGlow {
  0%,100% { filter: drop-shadow(0 0 10px rgba(200,0,0,0.6)); }
  50%      { filter: drop-shadow(0 0 30px rgba(255,60,0,1)) drop-shadow(0 0 60px rgba(200,0,0,0.4)); }
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg2"></div>
  <div class="bg3"></div>

  <div class="content">
    <p class="msg">I CAN'T<br/>WAIT<br/>THAT MUCH</p>
    <a href="#" class="btn"><span>Justify Yourself</span></a>
  </div>
</body>
</html>
